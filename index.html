    function isDocumentExpired(e){if(!e)return false;const t=new Date,n=new Date(e);return t>n}

    // ========== ФУНКЦИЯ ОТКРЕПЛЕНИЯ (ИСПРАВЛЕНА) ==========
    window.unpinMessage=async function(messageId,messageName,messageText){
        console.log("Открепление сообщения:",messageId,messageName,messageText);
        if(currentUser!=='Yura'&&currentUserRole!=='admin'){showNotification('Нет прав для открепления сообщений!','error');return}
        if(!messageId){showNotification('Ошибка: ID сообщения не найден!','error');return}
        try{
            const docRef=db.collection('pinnedMessages').doc(messageId);
            const docSnap=await docRef.get();
            if(!docSnap.exists){showNotification('Сообщение уже было откреплено или не найдено!','warning');loadPinnedMessages();return}
            await docRef.delete();
            console.log("Сообщение успешно удалено из коллекции pinnedMessages");
            await logAdminAction(`📌 Открепление сообщения`,'Чат',`Сообщение от ${messageName}: ${messageText.substring(0,50)}...`);
            showNotification('✅ Сообщение откреплено!','success');
            await loadPinnedMessages();
        }catch(e){console.error("Ошибка при откреплении:",e);showNotification('Ошибка при откреплении: '+e.message,'error')}
    }

    async function transferMoney(to,amount){if(!userData)return{success:false,message:'Не авторизован'};if(userData.username===to)return{success:false,message:'Нельзя перевести самому себе'};if(amount<=0)return{success:false,message:'Сумма должна быть больше 0'};if(userData.balance<amount)return{success:false,message:'Недостаточно средств'};const ur=db.collection('users').doc(userData.username),tr=db.collection('users').doc(to);try{await db.runTransaction(async t=>{const ud=await t.get(ur),td=await t.get(tr);if(!ud.exists)throw new Error('Отправитель не найден');if(!td.exists)throw new Error('Получатель не найден');const ub=ud.data().balance||0;if(ub<amount)throw new Error('Недостаточно средств');t.update(ur,{balance:ub-amount});t.update(tr,{balance:(td.data().balance||0)+amount})});userData.balance-=amount;updateCardUI();return{success:true,message:`Переведено ${amount.toLocaleString()} ₽ игроку ${to}`}}catch(e){return{success:false,message:e.message}}}
    async function doLogin(){const u=document.getElementById('loginUsername').value.trim(),p=document.getElementById('loginPassword').value,r=document.getElementById('rememberMe').checked;if(!u||!p){showNotification('Введите никнейм и пароль!','error');return}const d=await db.collection('users').doc(u).get();if(!d.exists){showNotification('❌ Пользователь не найден!','error');return}const hp=await hashPassword(p);if(d.data().password!==hp){showNotification('❌ Неверный пароль!','error');return}if(d.data().isBanned&&u!=='Yura'){showNotification('⛔ Аккаунт забанен!','error');return}currentUser=u;document.getElementById('mainContent').style.display='block';document.getElementById('authModal').style.display='none';await loadUserData(u);if(r)localStorage.setItem('rememberedUser',u);else localStorage.removeItem('rememberedUser');renderJobStatus();loadTickets();loadChat();loadPinnedMessages();if(currentUser==='Yura'||currentUserRole==='admin'){document.getElementById('adminPanel').style.display='block';renderPlayersTable()}}
    async function doRegister(){const u=document.getElementById('registerUsername').value.trim(),p=document.getElementById('registerPassword').value;if(!u||!p){showNotification('Введите никнейм и пароль!','error');return}if(u.length<3){showNotification('Никнейм должен быть минимум 3 символа!','error');return}if(p.length<4){showNotification('Пароль должен быть минимум 4 символа!','error');return}if(u.toLowerCase()==='yura'){showNotification('Этот никнейм зарезервирован!','error');return}const d=await db.collection('users').doc(u).get();if(d.exists){showNotification('❌ Пользователь с таким ником уже существует!','error');return}const hp=await hashPassword(p);const nu={username:u,password:hp,balance:50000,garage:[],businesses:[],businessLevels:{},job:null,lastPayTime:Date.now(),lastBusinessTime:Date.now(),policeTest:null,cashierTest:null,mayorTest:null,achievements:[],isBanned:false,passport:null,license:null,medicalCard:null,licenseCooldown:null,role:'player'};await db.collection('users').doc(u).set(nu);showNotification('✅ Регистрация успешна! Теперь войдите.','success');document.getElementById('loginUsername').value=u;document.getElementById('loginPassword').value='';document.getElementById('registerUsername').value='';document.getElementById('registerPassword').value=''}
    function logout(){currentUser=null;userData=null;currentUserRole='player';localStorage.removeItem('rememberedUser');document.getElementById('mainContent').style.display='none';document.getElementById('adminPanel').style.display='none';document.getElementById('authModal').style.display='flex';updateUI()}
    async function restoreSession(){const r=localStorage.getItem('rememberedUser');if(r){const d=await db.collection('users').doc(r).get();if(d.exists&&!d.data().isBanned){currentUser=r;document.getElementById('mainContent').style.display='block';document.getElementById('authModal').style.display='none';await loadUserData(r);loadTickets();loadChat();loadPinnedMessages();if(currentUser==='Yura'||currentUserRole==='admin'){document.getElementById('adminPanel').style.display='block';renderPlayersTable()}return true}}return false}
    async function giveMoney(t,a){if(currentUser!=='Yura'&&currentUserRole!=='admin'){showNotification('Нет прав!','error');return}const d=await db.collection('users').doc(t).get();if(d.exists){const data=d.data();data.balance=(data.balance||0)+a;await db.collection('users').doc(t).set(data);await logAdminAction(`💰 Выдача денег (панель)`,t,`Сумма: ${a.toLocaleString()} ₽`);if(currentUser===t&&userData)userData.balance=data.balance;document.getElementById('moneyResult').innerHTML=`<span style="color:#8aff8a;">✅ Выдано ${a}₽</span>`;setTimeout(()=>document.getElementById('moneyResult').innerHTML='',3000);await loadAllUsers()}else{document.getElementById('moneyResult').innerHTML=`<span style="color:#ff8a8a;">❌ Игрок не найден</span>`}}
    async function takeMoney(t,a){if(currentUser!=='Yura'&&currentUserRole!=='admin'){showNotification('Нет прав!','error');return}const d=await db.collection('users').doc(t).get();if(d.exists){const data=d.data();data.balance=Math.max(0,(data.balance||0)-a);await db.collection('users').doc(t).set(data);await logAdminAction(`💰 Изъятие денег (панель)`,t,`Сумма: ${a.toLocaleString()} ₽`);if(currentUser===t&&userData)userData.balance=data.balance;document.getElementById('moneyResult').innerHTML=`<span style="color:#ffaa00;">✅ Забрано ${a}₽</span>`;setTimeout(()=>document.getElementById('moneyResult').innerHTML='',3000);await loadAllUsers()}else{document.getElementById('moneyResult').innerHTML=`<span style="color:#ff8a8a;">❌ Игрок не найден</span>`}}
    async function giveProperty(t,ty,n){if(currentUser!=='Yura'&&currentUserRole!=='admin'){showNotification('Нет прав!','error');return}const d=await db.collection('users').doc(t).get();if(d.exists){const data=d.data();if(ty==='car'){if(!data.garage)data.garage=[];data.garage.push(n);await logAdminAction(`🚗 Выдача машины (панель)`,t,`Машина: ${n}`)}else if(ty==='business'){if(!data.businesses)data.businesses=[];data.businesses.push(n);await logAdminAction(`🏢 Выдача бизнеса (панель)`,t,`Бизнес: ${n}`)}await db.collection('users').doc(t).set(data);showNotification(`✅ Выдано ${ty==='car'?'авто':'бизнес'} ${n} игроку ${t}`,'success');await loadAllUsers()}else{showNotification('Игрок не найден!','error')}}
    async function takeProperty(t,ty,n){if(currentUser!=='Yura'&&currentUserRole!=='admin'){showNotification('Нет прав!','error');return}const d=await db.collection('users').doc(t).get();if(d.exists){const data=d.data();if(ty==='car'&&data.garage){data.garage=data.garage.filter(c=>c!==n);await logAdminAction(`🚗 Изъятие машины (панель)`,t,`Машина: ${n}`)}else if(ty==='business'&&data.businesses){data.businesses=data.businesses.filter(b=>b!==n);await logAdminAction(`🏢 Изъятие бизнеса (панель)`,t,`Бизнес: ${n}`)}await db.collection('users').doc(t).set(data);showNotification(`✅ Забрано ${ty==='car'?'авто':'бизнес'} ${n} у ${t}`,'success');await loadAllUsers()}else{showNotification('Игрок не найден!','error')}}
    async function loadChat(){const s=await db.collection('globalChat').orderBy('timestamp','asc').limit(100).get();renderChat(s.docs.map(d=>({id:d.id,...d.data()})))}
    function getRoleTag(u){if(u==='Yura')return roleTags.creator;const user=allUsers.find(x=>x.username===u);if(user&&user.role==='admin')return roleTags.admin;if(user&&user.role==='moderator')return roleTags.moderator;return roleTags.player}
    function renderChat(m){const c=document.getElementById('chatMessages');if(!c)return;c.innerHTML=m.map(m=>`<div class="chat-message" id="msg-${m.id}"><div><span class="chat-name" style="color:${m.name==='Yura'?'#ffaa00':'#ff9a6e'}">${getRoleTag(m.name)} ${escapeHtml(m.name)}</span><span class="chat-time">${new Date(m.timestamp).toLocaleTimeString()}</span>${(currentUser==='Yura'||currentUserRole==='admin')?`<button class="admin-btn" style="float:right;padding:2px 8px;" onclick="pinMessage('${m.id}','${escapeHtml(m.name)}','${escapeHtml(m.text).replace(/'/g,"\\'")}')">📌 Закрепить</button>`:''}</div><div>${escapeHtml(m.text)}</div></div>`).join('');c.scrollTop=c.scrollHeight}
    async function sendChatMessage(){if(!currentUser)return;const t=document.getElementById('messageInput').value.trim();if(!t)return;if(t.length>200){showNotification('Сообщение слишком длинное! Максимум 200 символов','error');return}await db.collection('globalChat').add({name:currentUser,text:t,timestamp:Date.now(),role:currentUserRole});document.getElementById('messageInput').value=''}
    function renderBuildings(){const c=document.getElementById('buildingsGrid');if(c)c.innerHTML=buildings.map(b=>`<div class="showcase-card"><div class="showcase-img" style="background-image:url('${b.image}');background-size:cover"></div><div class="showcase-info"><h4>${b.name}</h4><p>${b.desc}</p></div></div>`).join('')}
    function renderBusinesses(){const c=document.getElementById('businessesGrid');if(!c)return;c.innerHTML=businessesList.map(b=>{const o=userData?.businesses?.includes(b.id);return`<div class="business-card"><div class="business-icon"><i class="fas ${b.icon}"></i></div><div class="business-info"><h4>${b.name}</h4><div class="business-income">💰 Доход: ${(b.income*(userData?.businessLevels?.[b.id]||1)).toLocaleString()} ₽/час</div><div class="business-level">📈 Уровень: ${userData?.businessLevels?.[b.id]||1}</div><div>💵 Цена: ${b.price.toLocaleString()} ₽</div>${o?'<button class="business-btn" disabled>✅ Принадлежит</button>':`<button class="business-btn" onclick="buyBusiness('${b.id}')">Купить бизнес</button>`}${o&&(userData?.businessLevels?.[b.id]||1)<5?`<button class="business-btn" onclick="upgradeBusiness('${b.id}')" style="margin-top:5px;background:#ffaa00;color:#000;">📈 Улучшить (${(b.price*0.5).toLocaleString()}₽)</button>`:''}</div></div>`}).join('')}
    window.buyBusiness=async function(i){if(!userData)return;const b=businessesList.find(x=>x.id===i);if(userData.businesses?.includes(i))return;if(userData.balance>=b.price){userData.balance-=b.price;if(!userData.businesses)userData.businesses=[];userData.businesses.push(i);if(!userData.businessLevels)userData.businessLevels={};userData.businessLevels[i]=1;await saveUserData();updateCardUI();renderBusinesses();renderMyBusinesses();await updateAchievements();renderAchievements();showNotification(`✅ Вы купили ${b.name}!`,'success')}else{showNotification(`❌ Не хватает ${b.price.toLocaleString()}₽`,'error')}}
    window.upgradeBusiness=async function(i){if(!userData)return;const b=businessesList.find(x=>x.id===i);const cl=userData.businessLevels?.[i]||1;if(cl>=5)return;const uc=b.price*0.5;if(userData.balance>=uc){userData.balance-=uc;userData.businessLevels[i]=cl+1;await saveUserData();updateCardUI();renderBusinesses();renderMyBusinesses();showNotification(`✅ ${b.name} улучшен до ${cl+1} уровня!`,'success')}else{showNotification(`❌ Не хватает ${uc.toLocaleString()}₽ для улучшения`,'error')}}
    function renderMyBusinesses(){const c=document.getElementById('myBusinessesList');if(!c)return;if(!userData?.businesses||userData.businesses.length===0){c.innerHTML='<p>У вас пока нет бизнесов. Купите первый!</p>';return}let ti=0;const bh=userData.businesses.map(bid=>{const biz=businessesList.find(b=>b.id===bid);const lvl=userData.businessLevels?.[bid]||1;const inc=biz.income*lvl;ti+=inc;return`<p>🏢 ${biz.name} | Уровень ${lvl} | Доход: ${inc.toLocaleString()} ₽/час</p>`}).join('');c.innerHTML=bh+`<p style="margin-top:10px;color:#ffaa00;"><strong>💰 Общий доход с бизнесов: ${ti.toLocaleString()} ₽/час</strong></p>`}
    async function checkBusinessIncome(){if(!userData||!userData.businesses||userData.businesses.length===0)return;const n=Date.now();if(n-(userData.lastBusinessTime||0)>=3600000){let ti=0;for(const bid of userData.businesses){const biz=businessesList.find(b=>b.id===bid);const lvl=userData.businessLevels?.[bid]||1;ti+=biz.income*lvl}userData.balance+=ti;userData.lastBusinessTime=n;await saveUserData();updateCardUI();renderMyBusinesses();await updateAchievements();renderAchievements();showNotification(`💰 Получен доход с бизнесов: ${ti.toLocaleString()} ₽`,'success')}}
    setInterval(checkBusinessIncome,60000)
    function renderShop(){if(!userData)return;const c=document.getElementById('vehicleList');if(!c)return;c.innerHTML=vehicles.map((v,i)=>`<div class="vehicle-item"><div class="vehicle-img"><i class="${v.icon}"></i></div><div class="vehicle-info"><h4>${v.name}</h4><div class="price">💰 ${v.price.toLocaleString()} ₽</div><button class="buy-btn" onclick="buyVehicle(${i})" ${userData.garage?.includes(v.name)?'disabled':''}>${userData.garage?.includes(v.name)?'✅ В гараже':'Купить'}</button></div></div>`).join('');const g=document.getElementById('garageContent');const garage=userData.garage||[];g.innerHTML=garage.length?garage.map(n=>`<p>🚘 ${escapeHtml(n)}</p>`).join(''):'<p>У вас пока нет машин</p>'}
    window.buyVehicle=async function(i){if(!userData)return;const v=vehicles[i];if(userData.garage?.includes(v.name))return;if(userData.balance>=v.price){userData.balance-=v.price;if(!userData.garage)userData.garage=[];userData.garage.push(v.name);await saveUserData();updateCardUI();renderShop();await updateAchievements();renderAchievements();showNotification(`✅ Куплено: ${v.name}`,'success')}else{showNotification(`❌ Не хватает ${v.price.toLocaleString()}₽`,'error')}}
    function renderTests(){if(!userData)return;const c=document.getElementById('testsContainer');if(!c)return;c.innerHTML='';for(const[id,test]of Object.entries(testsData)){const s=userData[id];let sh='',lk=false;if(s==='passed')sh='<div class="test-status passed">✅ Тест сдан!</div>';else if(s?.startsWith('cooldown_')){const e=parseInt(s.split('_')[1]);const r=Math.max(0,e-Date.now());if(r>0){sh=`<div class="test-status locked">⏳ Пересдача через ${Math.floor(r/60000)} мин</div>`;lk=true}else{userData[id]=null;saveUserData();sh='<div class="test-status failed">❌ Тест не сдан</div>'}}else{sh='<div class="test-status failed">❌ Тест не сдан</div>'}c.innerHTML+=`<div class="test-card"><h3>${test.name}</h3>${sh}<button class="test-btn open-test-btn" onclick="toggleQuestions('${id}')" ${lk?'disabled':''}>📋 Пройти тест</button><div class="test-questions" id="questions-${id}">${test.questions.map((q,idx)=>`<div class="question"><p>${idx+1}. ${q.text}</p>${q.options.map((o,oi)=>`<label><input type="radio" name="q${id}_${idx}" value="${oi}"> ${o}</label><br>`).join('')}</div>`).join('')}<button class="test-btn" onclick="submitTest('${id}')">✅ Отправить</button></div></div>`}}
    window.toggleQuestions=function(id){const d=document.getElementById(`questions-${id}`);if(d)d.style.display=d.style.display==='none'?'block':'none'}
    window.submitTest=async function(id){if(!userData)return;const test=testsData[id];let c=0;for(let i=0;i<test.questions.length;i++){const s=document.querySelector(`input[name="q${id}_${i}"]:checked`);if(s&&parseInt(s.value)===test.questions[i].correct)c++}if(c>=3){userData[id]='passed';await saveUserData();await updateAchievements();renderAchievements();showNotification(`✅ Тест сдан! (${c}/5)`,'success');renderTests()}else{userData[id]=`cooldown_${Date.now()+30*60000}`;await saveUserData();showNotification(`❌ Тест не сдан (${c}/5). Пересдача через 30 мин.`,'error');renderTests()}}
    function renderJobStatus(){if(!userData)return;const sm={taxi:30000,police:35000,mechanic:25000,loader:20000,cashier:45000,mayor:80000,svoya:43000};if(userData.job){let jn={taxi:'Таксист',police:'Полиция',mechanic:'Механик',loader:'Грузчик',cashier:'Инкассатор',mayor:'Мэр',svoya:'Своя'}[userData.job];document.getElementById('jobStatus').innerHTML=`✅ Работает: ${jn} (+${sm[userData.job].toLocaleString()}₽/час)`}else{document.getElementById('jobStatus').innerHTML=`❌ Профессия не выбрана`}}
    const sm={taxi:30000,police:35000,mechanic:25000,loader:20000,cashier:45000,mayor:80000,svoya:43000}

    function renderAchievements(){if(!userData)return;const c=document.getElementById('achievementsGrid');if(!c)return;const u=userData.achievements||[];c.innerHTML=achievementsList.map(a=>`<div class="achievement-card ${u.includes(a.id)?'unlocked':''}"><div class="achievement-icon"><i class="fas ${a.icon}"></i></div><div class="achievement-title">${a.title}</div><div class="achievement-desc">${a.desc}</div>${u.includes(a.id)?'<span style="color:#ffaa00;">✓ Получено</span>':'<span style="color:#666;">🔒 Не выполнено</span>'}</div>`).join('')}

    async function createTicket(){if(!currentUser)return;const t=document.getElementById('ticketTitle').value.trim(),x=document.getElementById('ticketText').value.trim();if(!t||!x){showNotification('Заполните тему и текст обращения!','error');return}await db.collection('tickets').add({username:currentUser,title:t,text:x,date:new Date().toISOString(),replies:[]});document.getElementById('ticketTitle').value='';document.getElementById('ticketText').value='';showNotification('✅ Обращение создано!','success')}
    async function replyToTicket(id){if(currentUser!=='Yura'&&currentUserRole!=='admin'&&currentUserRole!=='moderator'){showNotification('Нет прав для ответа!','error');return}const r=document.getElementById(`reply-${id}`).value.trim();if(!r)return;const tr=db.collection('tickets').doc(id);const t=(await tr.get()).data();const rep=t.replies||[];rep.push({username:currentUser,text:r,admin:(currentUser==='Yura'||currentUserRole==='admin')});await tr.update({replies:rep});await logAdminAction(`💬 Ответ в тикете`,`Тикет #${id}`,`Ответ: ${r.substring(0,50)}...`);document.getElementById(`reply-${id}`).value='';showNotification('✅ Ответ отправлен!','success')}

    function showTransferModal(){document.getElementById('transferModal').style.display='flex'}
    function closeTransferModal(){document.getElementById('transferModal').style.display='none'}
    document.getElementById('doLoginBtn').onclick=doLogin;document.getElementById('doRegisterBtn').onclick=doRegister;document.getElementById('showTransferBtn').onclick=showTransferModal;document.getElementById('refreshBalanceBtn').onclick=()=>{if(userData)updateCardUI()};document.getElementById('confirmTransferBtn').onclick=async()=>{const t=document.getElementById('transferTo').value.trim(),a=parseInt(document.getElementById('transferAmount').value),r=await transferMoney(t,a);showNotification(r.message,r.success?'success':'error');if(r.success){closeTransferModal();document.getElementById('transferTo').value='';document.getElementById('transferAmount').value=''}};document.getElementById('createTicketBtn').onclick=createTicket;document.getElementById('applyPassportBtn').onclick=showPassportModal;document.getElementById('applyLicenseBtn').onclick=saveLicense;document.getElementById('savePassportBtn').onclick=savePassport;document.getElementById('submitPddBtn').onclick=submitPddTest;document.getElementById('sendChatBtn').onclick=sendChatMessage;document.getElementById('confirmRenewMedicalBtn').onclick=renewMedicalCard;document.getElementById('confirmRenewLicenseBtn').onclick=renewLicense
    document.querySelectorAll('.admin-tab').forEach(t=>{t.onclick=()=>{document.querySelectorAll('.admin-tab').forEach(t=>t.classList.remove('active'));t.classList.add('active');const tn=t.dataset.tab;document.getElementById('playersTab').style.display=tn==='players'?'block':'none';document.getElementById('rolesTab').style.display=tn==='roles'?'block':'none';document.getElementById('moneyTab').style.display=tn==='money'?'block':'none';document.getElementById('worklogTab').style.display=tn==='worklog'?'block':'none';if(tn==='players')renderPlayersTable();if(tn==='worklog')loadWorkLog()}})
    document.getElementById('assignRoleBtnPanel').onclick=async()=>{const u=document.getElementById('roleUser').value.trim(),r=document.getElementById('roleType').value;await assignRole(u,r)};document.getElementById('removeRoleBtnPanel').onclick=async()=>{const u=document.getElementById('roleUser').value.trim();await removeRole(u)};document.getElementById('giveMoneyBtnPanel').onclick=()=>{const u=document.getElementById('targetUser').value.trim(),a=parseInt(document.getElementById('moneyAmount').value);if(u&&a>0)giveMoney(u,a);else showNotification('Введите ник и сумму!','error')};document.getElementById('takeMoneyBtnPanel').onclick=()=>{const u=document.getElementById('targetUser').value.trim(),a=parseInt(document.getElementById('moneyAmount').value);if(u&&a>0)takeMoney(u,a);else showNotification('Введите ник и сумму!','error')};document.getElementById('givePropertyBtn').onclick=()=>{const u=document.getElementById('targetUser').value.trim(),n=document.getElementById('propertyName').value.trim(),t=document.getElementById('propertyType').value;if(u&&n)giveProperty(u,t,n);else showNotification('Введите ник и название!','error')};document.getElementById('takePropertyBtn').onclick=()=>{const u=document.getElementById('targetUser').value.trim(),n=document.getElementById('propertyName').value.trim(),t=document.getElementById('propertyType').value;if(u&&n)takeProperty(u,t,n);else showNotification('Введите ник и название!','error')}
    window.replyToTicket=replyToTicket;window.showSection=showSection;window.ifLoggedIn=(cb)=>{if(currentUser)cb();else showAuthModal()};window.logout=logout;window.showAuthModal=showAuthModal;window.closeTransferModal=closeTransferModal;window.removeRole=removeRole;window.closePlayerDocsModal=closePlayerDocsModal;window.showRenewMedicalModal=showRenewMedicalModal;window.showRenewLicenseModal=showRenewLicenseModal;window.closeRenewMedicalModal=closeRenewMedicalModal;window.closeRenewLicenseModal=closeRenewLicenseModal
    restoreSession()}
    function initFirebase(){if(typeof firebase!=='undefined'&&!db){firebase.initializeApp(firebaseConfig);db=firebase.firestore();console.log("Firebase инициализирован");initSite()}else if(typeof firebase==='undefined'){setTimeout(initFirebase,100)}}
    initFirebase()
    </script>
